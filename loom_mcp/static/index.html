<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1b26">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <title>Loom — Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/style.ui-branch.css">
  <link rel="stylesheet" href="/static/vendor/xterm.min.css">
  <link rel="stylesheet" href="/static/vendor/katex.min.css">
  <script src="/static/vendor/katex.min.js"></script>
  <script src="/static/vendor/katex-auto-render.min.js"></script>
  <script src="/static/vendor/xterm.min.js"></script>
  <script src="/static/vendor/xterm-fit.min.js"></script>
  <!-- Vendored locally — no CDN, instant load -->
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/vendor/d3-dispatch.min.js"></script>
  <script src="/static/vendor/d3-selection.min.js"></script>
  <script src="/static/vendor/d3-timer.min.js"></script>
  <script src="/static/vendor/d3-color.min.js"></script>
  <script src="/static/vendor/d3-ease.min.js"></script>
  <script src="/static/vendor/d3-interpolate.min.js"></script>
  <script src="/static/vendor/d3-transition.min.js"></script>
  <script src="/static/vendor/d3-drag.min.js"></script>
  <script src="/static/vendor/d3-zoom.min.js"></script>
  <script src="/static/vendor/cola.min.js"></script>
</head>
<body>
  <!-- Toolbar -->
  <header id="toolbar">
    <!-- Left cluster: brand + endpoint + tabs -->
    <div class="tb-left">
      <button id="sidebar-toggle" class="tb-brand-btn" title="Toggle sidebar">
        <svg class="tb-brand-mark" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
          <path d="M4 7 H20"/><path d="M4 12 H20"/><path d="M4 17 H20"/>
          <path d="M9 4 V20" opacity=".7"/><path d="M15 4 V20" opacity=".7"/>
        </svg>
        <span class="tb-brand-text">Loom</span>
      </button>

      <div id="target-selector">
        <button id="target-btn" class="tb-target" title="Switch between local and VM" data-endpoint-state="local">
          <span class="tb-target-dot"></span>
          Local
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 1L5 5L9 1"/></svg>
        </button>
        <div id="target-dropdown" class="hidden">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="tb-divider"></div>

      <div class="tb-tab-group" role="tablist">
        <button class="view-tab active" data-view="graph" aria-pressed="true">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="4" cy="4" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="7" cy="12" r="2"/>
            <path d="M5.5 5 L10.5 5.5" opacity=".6"/><path d="M5 6 L6.5 10" opacity=".6"/>
          </svg>
          Canvas
        </button>
        <button class="view-tab" data-view="files">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M2 3h5l1.5 1.5H14V13H2z"/>
          </svg>
          Files
        </button>
        <button class="view-tab" data-view="tags">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M4 4h3v3H4zM9 4h3v3H9zM4 9h3v3H4zM9 9h3v3H9z"/>
          </svg>
          Tags
        </button>
        <button class="view-tab" data-view="health">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M2 13 L5 8 L8 11 L11 5 L14 9"/>
          </svg>
          Health
        </button>
      </div>
    </div>

    <!-- Right cluster: search + theme + actions + settings -->
    <div class="tb-right">
      <div class="tb-search-wrap">
        <svg class="tb-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="6" cy="6" r="4.5"/><line x1="9.5" y1="9.5" x2="13" y2="13"/></svg>
        <input type="search" id="search-input" placeholder="Search pages, files, chats...">
        <kbd class="tb-kbd" id="search-kbd">&#8984;F</kbd>
      </div>
      <div class="tb-divider"></div>
      <div class="tb-theme-dropdown" id="theme-dropdown-wrap">
        <button id="theme-toggle" class="tb-icon-btn" title="Theme">&#9790;</button>
        <div class="tb-theme-menu hidden" id="theme-menu">
          <div class="tb-theme-option" data-theme="dark">
            <span class="tb-theme-swatch" style="background:linear-gradient(90deg, oklch(0.19 0.035 258) 33%, oklch(0.25 0.038 258) 33% 66%, oklch(0.74 0.15 258) 66%)"></span>
            Dark <span class="tb-theme-check" data-for="dark">&#10003;</span>
          </div>
          <div class="tb-theme-option" data-theme="light">
            <span class="tb-theme-swatch" style="background:linear-gradient(90deg, oklch(0.995 0.002 255) 33%, oklch(0.96 0.005 255) 33% 66%, oklch(0.55 0.15 255) 66%)"></span>
            Light <span class="tb-theme-check" data-for="light">&#10003;</span>
          </div>
          <div class="tb-theme-option" data-theme="paper">
            <span class="tb-theme-swatch" style="background:linear-gradient(90deg, oklch(0.962 0.008 90) 33%, oklch(0.938 0.009 90) 33% 66%, oklch(0.50 0.15 35) 66%)"></span>
            Paper <span class="tb-theme-check" data-for="paper">&#10003;</span>
          </div>
        </div>
      </div>
      <div class="filter-dropdown" id="action-menu-dropdown">
        <button class="filter-btn" id="btn-action-menu" title="Actions">+</button>
        <div class="filter-menu action-menu" id="action-menu">
          <div class="action-item" onclick="createNewFile(); closeActionMenu()">New File</div>
          <div class="action-item" onclick="createNewFolder(); closeActionMenu()">New Folder</div>
          <hr>
          <div class="action-item" onclick="openNewChat(); closeActionMenu()">New Chat</div>
          <div class="action-item" onclick="createTerminalPanel(); closeActionMenu()">New Terminal</div>
          <hr>
          <div class="action-item" onclick="deleteCurrentFile(); closeActionMenu()">Delete File</div>
          <hr>
          <div class="action-item" onclick="restartServer(); closeActionMenu()">Restart Server</div>
          <div id="action-context-items"></div>
        </div>
      </div>
      <!-- Filter button (canvas-specific) -->
      <div class="filter-dropdown" id="filter-dropdown">
        <button class="tb-icon-btn" id="btn-filters" title="Filters">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 3h12L9 8.5V12l-2 1V8.5L2 3z"/></svg>
          <span id="filter-active-dot" style="display:none;color:var(--accent);font-size:8px;position:absolute;top:2px;right:2px">&#9679;</span>
        </button>
        <div class="filter-menu toolbar-menu" id="toolbar-menu">
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Canvas</div>
            <div class="toolbar-menu-body">
              <div class="toolbar-menu-row">
                <button id="btn-auto-layout">Layout</button>
                <button id="btn-fit">Fit</button>
              </div>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Type Filter</div>
            <div class="toolbar-menu-body collapsed" id="filter-type-menu">
              <label><input type="checkbox" value="concept" checked> concept</label>
              <label><input type="checkbox" value="summary" checked> summary</label>
              <label><input type="checkbox" value="index" checked> index</label>
              <label><input type="checkbox" value="answer" checked> answer</label>
              <label><input type="checkbox" value="structure-note" checked> structure-note</label>
              <div class="toolbar-menu-row"><button id="filter-select-all">All</button><button id="filter-clear-all">None</button></div>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Tag Filter</div>
            <div class="toolbar-menu-body collapsed" id="filter-tag-menu"><!-- Populated by JS --></div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">File Type Filter</div>
            <div class="toolbar-menu-body collapsed" id="filter-filetype-menu">
              <label><input type="checkbox" value="folder" checked> Folders</label>
              <label><input type="checkbox" value="markdown" checked> Markdown</label>
              <label><input type="checkbox" value="code" checked> Code</label>
              <label><input type="checkbox" value="papers" checked> Papers</label>
              <label><input type="checkbox" value="data" checked> Data</label>
              <label><input type="checkbox" value="misc" checked> Misc</label>
              <div class="toolbar-menu-row"><button id="filetype-select-all">All</button><button id="filetype-clear-all">None</button></div>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Hidden Files</div>
            <div class="toolbar-menu-body collapsed" id="filter-visibility-menu">
              <label><input type="checkbox" id="filter-show-internals"> Loom internals</label>
              <label><input type="checkbox" id="filter-show-dotfiles"> Dotfiles (.git, .env, ...)</label>
              <label><input type="checkbox" id="filter-show-hidden"> Build artifacts</label>
            </div>
          </div>
        </div>
      </div>
      <!-- Settings button — opens structured dropdown -->
      <div class="filter-dropdown" id="settings-dropdown-wrap">
        <button class="tb-icon-btn" id="btn-toolbar-menu" title="Settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 4H14M2 8H14M2 12H14"/></svg>
        </button>
        <div class="sm-dropdown hidden" id="settings-dropdown">
          <div class="sm-group" id="settings-menu">
            <button class="sm-item" onclick="closeSettingsDropdown()">
              <svg class="sm-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="6" r="2.4"/><path d="M3 13 Q8 9 13 13"/></svg>
              <span class="sm-label">Account</span>
              <span class="sm-kbd"></span>
            </button>
            <button class="sm-item" onclick="closeSettingsDropdown()">
              <svg class="sm-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2.5 5L5 3H13V13H3V5Z"/><path d="M2.5 5H11V13"/></svg>
              <span class="sm-label">Workspace</span>
              <span class="sm-kbd" id="settings-workspace-badge">Local</span>
            </button>
          </div>
          <div class="sm-divider"></div>
          <div class="sm-group">
            <div class="sm-group-label">Palettes</div>
            <button class="sm-item" onclick="openPalette('appearance'); closeSettingsDropdown()">
              <svg class="sm-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="5.2"/><path d="M8 2.8V8L11.5 11"/></svg>
              <span class="sm-label">Appearance<span class="sm-ellipsis">...</span></span>
              <span class="sm-kbd">&#8984;&#8679;A</span>
            </button>
            <button class="sm-item" onclick="openPalette('model'); closeSettingsDropdown()">
              <svg class="sm-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="5" cy="5" r="1.6"/><circle cx="11" cy="5" r="1.6"/><circle cx="8" cy="11" r="1.6"/><path d="M5 5L11 5M5 5L8 11M11 5L8 11" opacity=".5"/></svg>
              <span class="sm-label">Model &amp; agent<span class="sm-ellipsis">...</span></span>
              <span class="sm-kbd">&#8984;&#8679;M</span>
            </button>
            <button class="sm-item" onclick="openPermissionsPanel(); closeSettingsDropdown()">
              <svg class="sm-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M10 3L13 6L8 11L5 11L5 8Z"/><path d="M5 11L3 13"/></svg>
              <span class="sm-label">Tools &amp; permissions<span class="sm-ellipsis">...</span></span>
              <span class="sm-kbd">&#8984;&#8679;T</span>
            </button>
          </div>
          <div class="sm-divider"></div>
          <div class="sm-group">
            <button class="sm-item" onclick="openKeybindingPanel(); closeSettingsDropdown()">
              <svg class="sm-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2.5" y="5" width="11" height="6" rx="1.2"/><path d="M5 8H5.01M8 8H8.01M11 8H11.01"/></svg>
              <span class="sm-label">Keyboard shortcuts</span>
              <span class="sm-kbd">?</span>
            </button>
          </div>
          <div class="sm-divider"></div>
          <div class="sm-group">
            <button class="sm-item" onclick="closeSettingsDropdown()">
              <svg class="sm-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="2"/><path d="M8 2V3.5M8 12.5V14M2 8H3.5M12.5 8H14M3.8 3.8L4.8 4.8M11.2 11.2L12.2 12.2M3.8 12.2L4.8 11.2M11.2 4.8L12.2 3.8"/></svg>
              <span class="sm-label">Open full settings<span class="sm-ellipsis">...</span></span>
              <span class="sm-kbd">&#8984;,</span>
            </button>
            <button class="sm-item" onclick="closeSettingsDropdown()">
              <svg class="sm-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="5.5"/><path d="M8 7V11M8 5H8.01"/></svg>
              <span class="sm-label">About Loom</span>
              <span class="sm-kbd">v0.1</span>
            </button>
          </div>
          <!-- Hidden settings fields — loaded via JS, not visible in dropdown -->
          <div style="display:none">
            <input type="text" id="settings-loom-root" placeholder="/path/to/loom">
            <button id="settings-save-root">Save</button>
            <span id="settings-auth-status"></span>
            <button id="settings-login">Login</button>
            <input type="range" id="settings-code-font" min="10" max="20" value="13">
            <span id="settings-code-font-val">13px</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Appearance Palette (floating card) -->
  <aside class="palette hidden" id="palette-appearance">
    <div class="palette-head">
      <div><span class="palette-eyebrow">Palette</span><h3 class="palette-title">Appearance</h3></div>
      <button class="tb-icon-btn palette-close" onclick="closePalette()" title="Close">&#10005;</button>
    </div>
    <div class="palette-body">
      <div class="palette-row">
        <label>Palette</label>
        <div class="seg" data-setting="palette">
          <button data-val="blue">Blue</button>
          <button data-val="slate">Slate</button>
        </div>
      </div>
      <div class="palette-row">
        <label>Theme</label>
        <div class="seg" data-setting="theme">
          <button data-val="dark">Dark</button>
          <button data-val="light">Light</button>
          <button data-val="paper">Paper</button>
        </div>
      </div>
      <div class="palette-row">
        <label>Typography</label>
        <div class="seg" data-setting="typography">
          <button data-val="mixed">Mixed</button>
          <button data-val="mono">All mono</button>
        </div>
      </div>
      <div class="palette-row">
        <label>Density</label>
        <div class="seg" data-setting="density">
          <button data-val="compact">Compact</button>
          <button data-val="standard">Standard</button>
          <button data-val="roomy">Roomy</button>
        </div>
      </div>
      <div class="palette-row">
        <label>Card Accent</label>
        <div class="seg" data-setting="accent">
          <button data-val="border">Left border</button>
          <button data-val="dot">Dot</button>
          <button data-val="flat">Flat</button>
        </div>
      </div>
      <div class="palette-row">
        <label>Canvas Background</label>
        <div class="seg" data-setting="canvas">
          <button data-val="dots">Dots</button>
          <button data-val="grid">Grid</button>
          <button data-val="paper">Paper</button>
          <button data-val="constellation">Stars</button>
        </div>
      </div>
      <div class="palette-row">
        <label>Loom Threads <span class="palette-desc">· faint lines from chat to focused card</span></label>
        <div class="seg" data-setting="threads">
          <button data-val="off">Off</button>
          <button data-val="on">On</button>
        </div>
      </div>
      <div class="palette-row">
        <label>Accent Hue</label>
        <input type="range" id="accent-hue-slider" min="0" max="360" value="258" style="width:100%;accent-color:var(--accent)">
      </div>
    </div>
    <div class="palette-foot">
      <span class="palette-hint">Esc to dismiss</span>
      <button class="palette-link" onclick="closePalette()">Open in full settings &#8594;</button>
    </div>
  </aside>

  <!-- Model & Agent Palette (floating card) -->
  <aside class="palette hidden" id="palette-model">
    <div class="palette-head">
      <div><span class="palette-eyebrow">Palette</span><h3 class="palette-title">Model &amp; agent</h3></div>
      <button class="tb-icon-btn palette-close" onclick="closePalette()" title="Close">&#10005;</button>
    </div>
    <div class="palette-body">
      <div class="palette-row">
        <label>Active Model</label>
        <div class="seg" data-setting="model">
          <button data-val="sonnet">Sonnet</button>
          <button data-val="haiku">Haiku</button>
          <button data-val="opus">Opus</button>
        </div>
      </div>
      <div class="palette-row">
        <label>Agent</label>
        <div class="seg" data-setting="agent">
          <button data-val="claude-code">Claude Code</button>
          <button data-val="codex">Codex</button>
        </div>
      </div>
      <div class="palette-row">
        <label>Temperature <span class="palette-desc" id="temp-val">· 0.4</span></label>
        <input type="range" id="temperature-slider" min="0" max="100" value="40" style="width:100%;accent-color:var(--accent)">
      </div>
      <div class="palette-row">
        <label>Reasoning Depth</label>
        <div class="seg" data-setting="reasoning">
          <button data-val="low">Low</button>
          <button data-val="med">Med</button>
          <button data-val="high">High</button>
        </div>
      </div>
      <div class="palette-row">
        <label>System Prompt Preset</label>
        <div class="seg" data-setting="preset">
          <button data-val="default">Default</button>
          <button data-val="researcher">Researcher</button>
          <button data-val="code">Code</button>
        </div>
      </div>
      <div class="palette-row">
        <label>Stream Tokens</label>
        <div class="seg" data-setting="stream">
          <button data-val="on">On</button>
          <button data-val="off">Off</button>
        </div>
      </div>
    </div>
    <div class="palette-foot">
      <span class="palette-hint">Esc to dismiss</span>
      <button class="palette-link" onclick="closePalette()">Open in full settings &#8594;</button>
    </div>
  </aside>

  <!-- Main content area -->
  <div id="main">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-tree"></div>
    </aside>

    <!-- Canvas / views -->
    <div id="canvas-container">
      <!-- Graph canvas (default view) -->
      <div id="view-graph" class="view active">
        <div id="breadcrumb-bar"><span class="crumb crumb-root" data-level="root">Root</span></div>
        <div id="infinite-canvas">
          <svg id="edge-layer"></svg>
          <div id="world" data-lod="readable"></div>
        </div>
      </div>

      <!-- Other views -->
      <div id="view-files" class="view">
        <div id="files-header">
          <div id="files-breadcrumbs"><span class="breadcrumb-item" data-path="">loom</span></div>
          <span style="flex:1"></span>
          <select id="files-sort" class="files-sort" title="Sort by">
            <option value="name">Name</option>
            <option value="modified">Modified</option>
            <option value="added">Added</option>
          </select>
          <button id="files-mode-tree" class="files-mode active" title="Tree view"><span style="font-size:22px;margin-top:0px">≡</span></button>
          <button id="files-mode-tiles" class="files-mode" title="Tile view"><span style="font-size:22px;margin-top:-1px">⊞</span></button>
        </div>
        <div id="files-tree"></div>
        <div id="files-tiles" style="display:none"></div>
      </div>
      <div id="view-tags" class="view"><div id="tag-cloud"></div></div>
      <div id="view-health" class="view"><div id="health-dashboard"></div></div>
      <div id="view-search" class="view"><div id="search-results"></div></div>
    </div>
  </div>

  <!-- Chat Panel (bottom, dockable) -->
  <div id="chat-panel" class="chat-collapsed">
    <div class="chat-resize chat-resize-top" data-dir="top"></div>
    <div class="chat-resize chat-resize-left" data-dir="left"></div>
    <div class="chat-resize chat-resize-right" data-dir="right"></div>
    <div class="chat-resize chat-resize-bottom" data-dir="bottom"></div>
    <div class="chat-resize chat-resize-corner" data-dir="corner"></div>
    <div id="chat-header">
      <!-- Universal panel header injected by initChat() -->
    </div>
    <div id="chat-body">
      <div id="plan-pane" style="display:none">
        <div id="plan-header">
          <span id="plan-title">Plan</span>
          <span style="flex:1"></span>
          <button id="plan-edit-toggle" title="Toggle edit">Edit</button>
          <button id="plan-split-toggle" title="Toggle split direction">⇄</button>
          <button id="plan-close" title="Close plan">✕</button>
        </div>
        <div id="plan-content"></div>
        <textarea id="plan-editor" style="display:none"></textarea>
        <div id="plan-actions">
          <button id="plan-approve">Approve Plan</button>
          <button id="plan-changes">Request Changes</button>
        </div>
      </div>
      <div id="plan-divider" style="display:none"></div>
      <div id="chat-main">
        <div id="chat-messages"></div>
      </div>
    </div>
    <div id="chat-input-area">
      <div id="chat-context-preview" style="display:none"></div>
      <div id="chat-attachments" class="chat-attachments" style="display:none"></div>
      <div id="chat-input-pills" class="chat-input-pills">
        <span class="chat-context-chip" id="chat-context-chip" title="Click to cycle context level">
          <svg class="ctx-icon" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="6" cy="6" r="2.5"/><path d="M6 1v1.5m0 7V11m-5-5h1.5m7 0H11M2.5 2.5l1 1m5 5l1 1M2.5 9.5l1-1m5-5l1-1"/></svg>
          <span class="ctx-label">ctx:</span>
          <span class="ctx-scope">page</span>
          <span class="ctx-sep">&middot;</span>
          <span class="ctx-tokens">~1K</span>
          <span class="ctx-sep">/</span>
          <span class="ctx-max">200K</span>
          <span class="ctx-bar"><span class="ctx-bar-fill" style="width:0%"></span></span>
        </span>
      </div>
      <textarea id="chat-input" placeholder="Message Claude... (Enter to send)" rows="1"></textarea>
      <div id="chat-input-controls">
        <button id="chat-send">Send</button>
        <button id="chat-stop" style="display:none">Stop</button>
        <button id="chat-redirect" style="display:none">Redirect</button>
      </div>
    </div>
  </div>

  <!-- Floating "Ask Claude" tooltip (appears on text selection) -->
  <div id="selection-tooltip" style="display:none">
    <button id="selection-ask-btn">Chat with Claude</button>
  </div>

  <script>
  // Theme switcher — dropdown with preview swatches
  (function() {
    const themes = ['dark', 'light', 'paper'];
    const icons = { dark: '\u263E', light: '\u2600', paper: '\u{1F4D6}' };
    function getTheme() {
      const saved = localStorage.getItem('loom-theme');
      if (saved && themes.includes(saved)) return saved;
      if (window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
      return 'dark';
    }
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('loom-theme', t);
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = icons[t] || '\u263E';
      // Update check marks
      document.querySelectorAll('.tb-theme-check').forEach(el => {
        el.style.display = el.dataset.for === t ? 'inline' : 'none';
      });
    }
    applyTheme(getTheme());
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('theme-toggle');
      const menu = document.getElementById('theme-menu');
      if (btn && menu) {
        btn.textContent = icons[getTheme()] || '\u263E';
        // Toggle dropdown
        btn.onclick = function(e) { e.stopPropagation(); menu.classList.toggle('hidden'); };
        // Theme selection
        menu.querySelectorAll('.tb-theme-option').forEach(opt => {
          opt.onclick = function() { applyTheme(opt.dataset.theme); menu.classList.add('hidden'); };
        });
        // Close on outside click
        document.addEventListener('click', function() { menu.classList.add('hidden'); });
        menu.onclick = function(e) { e.stopPropagation(); };
      }
    });

    // Settings dropdown
    var settingsBtn = document.getElementById('btn-toolbar-menu');
    var settingsDD = document.getElementById('settings-dropdown');
    if (settingsBtn && settingsDD) {
      settingsBtn.onclick = function(e) { e.stopPropagation(); settingsDD.classList.toggle('hidden'); };
      document.addEventListener('click', function(e) {
        if (!settingsDD.contains(e.target) && e.target !== settingsBtn) settingsDD.classList.add('hidden');
      });
    }

    // Palette open/close
    window.openPalette = function(name) {
      closeSettingsDropdown();
      var palette = document.getElementById('palette-' + name);
      if (palette) { palette.classList.remove('hidden'); initSegmentedControls(); }
    };
    window.closePalette = function() {
      document.querySelectorAll('.palette').forEach(function(p) { p.classList.add('hidden'); });
    };
    window.closeSettingsDropdown = function() {
      if (settingsDD) settingsDD.classList.add('hidden');
    };
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closePalette();
    });

    // Segmented controls — wire all .seg elements
    function initSegmentedControls() {
      document.querySelectorAll('.seg[data-setting]').forEach(function(seg) {
        var setting = seg.dataset.setting;
        var attrMap = { theme: 'theme', canvas: 'canvas', accent: 'accent', density: 'density' };
        var attr = attrMap[setting] || setting;
        var saved = localStorage.getItem('loom-' + attr) || (setting === 'theme' ? getTheme() : null);

        // Set initial active state
        seg.querySelectorAll('button').forEach(function(btn) {
          btn.classList.toggle('on', btn.dataset.val === saved);
          btn.onclick = function() {
            seg.querySelectorAll('button').forEach(function(b) { b.classList.remove('on'); });
            btn.classList.add('on');
            var val = btn.dataset.val;
            localStorage.setItem('loom-' + attr, val);
            document.documentElement.setAttribute('data-' + attr, val);
            if (setting === 'theme') applyTheme(val);
          };
        });
      });
    }
    initSegmentedControls();

    // Appearance + model settings — apply saved values on load
    ['canvas', 'accent', 'density', 'palette', 'typography', 'threads', 'model', 'agent', 'reasoning', 'preset', 'stream'].forEach(function(attr) {
      var saved = localStorage.getItem('loom-' + attr);
      if (saved) document.documentElement.setAttribute('data-' + attr, saved);
    });
    // Defaults for required attributes
    if (!localStorage.getItem('loom-canvas')) document.documentElement.setAttribute('data-canvas', 'dots');
    if (!localStorage.getItem('loom-density')) document.documentElement.setAttribute('data-density', 'standard');
    if (!localStorage.getItem('loom-accent')) document.documentElement.setAttribute('data-accent', 'border');

    // Temperature slider
    var tempSlider = document.getElementById('temperature-slider');
    var tempVal = document.getElementById('temp-val');
    if (tempSlider) {
      var savedTemp = localStorage.getItem('loom-temperature') || '40';
      tempSlider.value = savedTemp;
      if (tempVal) tempVal.textContent = '· ' + (parseInt(savedTemp) / 100).toFixed(1);
      tempSlider.oninput = function() {
        localStorage.setItem('loom-temperature', tempSlider.value);
        if (tempVal) tempVal.textContent = '· ' + (parseInt(tempSlider.value) / 100).toFixed(1);
      };
    }
  })();
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <script src="/static/app.js"></script>
</body>
</html>
