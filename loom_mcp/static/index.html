<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1b26">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <title>Loom — Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/style.ui-branch.css">
  <link rel="stylesheet" href="/static/vendor/xterm.min.css">
  <link rel="stylesheet" href="/static/vendor/katex.min.css">
  <script src="/static/vendor/katex.min.js"></script>
  <script src="/static/vendor/katex-auto-render.min.js"></script>
  <script src="/static/vendor/xterm.min.js"></script>
  <script src="/static/vendor/xterm-fit.min.js"></script>
  <!-- Vendored locally — no CDN, instant load -->
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/vendor/d3-dispatch.min.js"></script>
  <script src="/static/vendor/d3-selection.min.js"></script>
  <script src="/static/vendor/d3-timer.min.js"></script>
  <script src="/static/vendor/d3-color.min.js"></script>
  <script src="/static/vendor/d3-ease.min.js"></script>
  <script src="/static/vendor/d3-interpolate.min.js"></script>
  <script src="/static/vendor/d3-transition.min.js"></script>
  <script src="/static/vendor/d3-drag.min.js"></script>
  <script src="/static/vendor/d3-zoom.min.js"></script>
  <script src="/static/vendor/cola.min.js"></script>
</head>
<body>
  <!-- Toolbar -->
  <header id="toolbar">
    <!-- Left cluster: brand + endpoint + tabs -->
    <div class="tb-left">
      <button id="sidebar-toggle" class="tb-brand" title="Toggle sidebar">Loom</button>
      <div class="tb-divider"></div>
      <div id="target-selector">
        <button id="target-btn" class="tb-chip" title="Switch between local and VM" data-endpoint-state="local">
          <span class="tb-status-dot">&#9679;</span> Local <span class="target-caret">&#9662;</span>
        </button>
        <div id="target-dropdown" class="hidden">
          <!-- Populated by JS -->
        </div>
      </div>
      <div class="tb-divider"></div>
      <div class="tb-tabs">
        <button class="view-tab active" data-view="graph">Canvas</button>
        <button class="view-tab" data-view="files">Files</button>
        <button class="view-tab" data-view="tags">Tags</button>
        <button class="view-tab" data-view="health">Health</button>
      </div>
    </div>

    <!-- Right cluster: search + theme + actions + settings -->
    <div class="tb-right">
      <div class="tb-search-wrap">
        <svg class="tb-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="6" cy="6" r="4.5"/><line x1="9.5" y1="9.5" x2="13" y2="13"/></svg>
        <input type="search" id="search-input" placeholder="Search...">
        <kbd class="tb-kbd" id="search-kbd">&#8984;F</kbd>
      </div>
      <div class="tb-divider"></div>
      <div class="tb-theme-dropdown" id="theme-dropdown-wrap">
        <button id="theme-toggle" class="tb-icon-btn" title="Theme">&#9790;</button>
        <div class="tb-theme-menu hidden" id="theme-menu">
          <div class="tb-theme-option" data-theme="dark">
            <span class="tb-theme-swatch" style="background:linear-gradient(90deg, oklch(0.19 0.035 258) 33%, oklch(0.25 0.038 258) 33% 66%, oklch(0.74 0.15 258) 66%)"></span>
            Dark <span class="tb-theme-check" data-for="dark">&#10003;</span>
          </div>
          <div class="tb-theme-option" data-theme="light">
            <span class="tb-theme-swatch" style="background:linear-gradient(90deg, oklch(0.995 0.002 255) 33%, oklch(0.96 0.005 255) 33% 66%, oklch(0.55 0.15 255) 66%)"></span>
            Light <span class="tb-theme-check" data-for="light">&#10003;</span>
          </div>
          <div class="tb-theme-option" data-theme="paper">
            <span class="tb-theme-swatch" style="background:linear-gradient(90deg, oklch(0.962 0.008 90) 33%, oklch(0.938 0.009 90) 33% 66%, oklch(0.50 0.15 35) 66%)"></span>
            Paper <span class="tb-theme-check" data-for="paper">&#10003;</span>
          </div>
        </div>
      </div>
      <div class="filter-dropdown" id="action-menu-dropdown">
        <button class="filter-btn" id="btn-action-menu" title="Actions">+</button>
        <div class="filter-menu action-menu" id="action-menu">
          <div class="action-item" onclick="createNewFile(); closeActionMenu()">New File</div>
          <div class="action-item" onclick="createNewFolder(); closeActionMenu()">New Folder</div>
          <hr>
          <div class="action-item" onclick="openNewChat(); closeActionMenu()">New Chat</div>
          <div class="action-item" onclick="createTerminalPanel(); closeActionMenu()">New Terminal</div>
          <hr>
          <div class="action-item" onclick="deleteCurrentFile(); closeActionMenu()">Delete File</div>
          <hr>
          <div class="action-item" onclick="restartServer(); closeActionMenu()">Restart Server</div>
          <div id="action-context-items"></div>
        </div>
      </div>
      <div class="filter-dropdown" id="toolbar-menu-dropdown">
        <button class="filter-btn" id="btn-toolbar-menu" title="Settings &amp; Filters"><span style="font-size:18px;line-height:1">&#9881;</span><span id="filter-active-dot" style="display:none">&#9679;</span></button>
        <div class="filter-menu toolbar-menu" id="toolbar-menu">
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Canvas</div>
            <div class="toolbar-menu-body">
              <div class="toolbar-menu-row">
                <button id="btn-auto-layout">Layout</button>
                <button id="btn-fit">Fit</button>
              </div>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Type Filter</div>
            <div class="toolbar-menu-body collapsed" id="filter-type-menu">
              <label><input type="checkbox" value="concept" checked> concept</label>
              <label><input type="checkbox" value="summary" checked> summary</label>
              <label><input type="checkbox" value="index" checked> index</label>
              <label><input type="checkbox" value="answer" checked> answer</label>
              <label><input type="checkbox" value="structure-note" checked> structure-note</label>
              <div class="toolbar-menu-row"><button id="filter-select-all">All</button><button id="filter-clear-all">None</button></div>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Tag Filter</div>
            <div class="toolbar-menu-body collapsed" id="filter-tag-menu"><!-- Populated by JS --></div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">File Type Filter</div>
            <div class="toolbar-menu-body collapsed" id="filter-filetype-menu">
              <label><input type="checkbox" value="folder" checked> Folders</label>
              <label><input type="checkbox" value="markdown" checked> Markdown</label>
              <label><input type="checkbox" value="code" checked> Code</label>
              <label><input type="checkbox" value="papers" checked> Papers</label>
              <label><input type="checkbox" value="data" checked> Data</label>
              <label><input type="checkbox" value="misc" checked> Misc</label>
              <div class="toolbar-menu-row"><button id="filetype-select-all">All</button><button id="filetype-clear-all">None</button></div>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Hidden Files</div>
            <div class="toolbar-menu-body collapsed" id="filter-visibility-menu">
              <label><input type="checkbox" id="filter-show-internals"> Loom internals</label>
              <label><input type="checkbox" id="filter-show-dotfiles"> Dotfiles (.git, .env, ...)</label>
              <label><input type="checkbox" id="filter-show-hidden"> Build artifacts</label>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Appearance</div>
            <div class="toolbar-menu-body collapsed" id="appearance-menu">
              <label class="settings-label" style="margin-bottom:4px">Canvas Background</label>
              <select id="setting-canvas-bg" class="settings-input" style="width:100%;margin-bottom:8px">
                <option value="none">None</option>
                <option value="dots" selected>Dots</option>
                <option value="grid">Grid</option>
                <option value="paper">Paper</option>
                <option value="constellation">Constellation</option>
              </select>
              <label class="settings-label" style="margin-bottom:4px">Card Accent</label>
              <select id="setting-card-accent" class="settings-input" style="width:100%;margin-bottom:8px">
                <option value="border" selected>Border</option>
                <option value="dot">Dot</option>
                <option value="flat">Flat</option>
              </select>
              <label class="settings-label" style="margin-bottom:4px">Density</label>
              <select id="setting-density" class="settings-input" style="width:100%">
                <option value="compact">Compact</option>
                <option value="standard" selected>Standard</option>
                <option value="roomy">Roomy</option>
              </select>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div id="settings-menu">
          <div class="settings-section">
            <label class="settings-label">Loom Root</label>
            <input type="text" id="settings-loom-root" class="settings-input" placeholder="/path/to/loom">
            <button id="settings-save-root" class="settings-action">Save &amp; Restart</button>
          </div>
          <hr>
          <div class="settings-section">
            <label class="settings-label">Claude Auth</label>
            <span id="settings-auth-status" class="settings-value">Checking...</span>
            <button id="settings-login" class="settings-action">Login</button>
          </div>
          <hr>
          <div class="settings-section">
            <label class="settings-label">Code Font Size</label>
            <input type="range" id="settings-code-font" min="10" max="20" value="13" class="settings-range">
            <span id="settings-code-font-val">13px</span>
          </div>
          <hr>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="openPermissionsPanel(); document.getElementById('toolbar-menu').classList.remove('open');">Agent Permissions</div>
          </div>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="openKeybindingPanel(); document.getElementById('toolbar-menu').classList.remove('open');">Keyboard Shortcuts (Cmd+K)</div>
          </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>
  <!-- old toolbar-left/toolbar-right classes removed; using tb-left/tb-center/tb-right -->

  <!-- Main content area -->
  <div id="main">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-tree"></div>
    </aside>

    <!-- Canvas / views -->
    <div id="canvas-container">
      <!-- Graph canvas (default view) -->
      <div id="view-graph" class="view active">
        <div id="breadcrumb-bar"><span class="crumb crumb-root" data-level="root">Root</span></div>
        <div id="infinite-canvas">
          <svg id="edge-layer"></svg>
          <div id="world" data-lod="readable"></div>
        </div>
      </div>

      <!-- Other views -->
      <div id="view-files" class="view">
        <div id="files-header">
          <div id="files-breadcrumbs"><span class="breadcrumb-item" data-path="">loom</span></div>
          <span style="flex:1"></span>
          <select id="files-sort" class="files-sort" title="Sort by">
            <option value="name">Name</option>
            <option value="modified">Modified</option>
            <option value="added">Added</option>
          </select>
          <button id="files-mode-tree" class="files-mode active" title="Tree view"><span style="font-size:22px;margin-top:0px">≡</span></button>
          <button id="files-mode-tiles" class="files-mode" title="Tile view"><span style="font-size:22px;margin-top:-1px">⊞</span></button>
        </div>
        <div id="files-tree"></div>
        <div id="files-tiles" style="display:none"></div>
      </div>
      <div id="view-tags" class="view"><div id="tag-cloud"></div></div>
      <div id="view-health" class="view"><div id="health-dashboard"></div></div>
      <div id="view-search" class="view"><div id="search-results"></div></div>
    </div>
  </div>

  <!-- Chat Panel (bottom, dockable) -->
  <div id="chat-panel" class="chat-collapsed">
    <div class="chat-resize chat-resize-top" data-dir="top"></div>
    <div class="chat-resize chat-resize-left" data-dir="left"></div>
    <div class="chat-resize chat-resize-right" data-dir="right"></div>
    <div class="chat-resize chat-resize-bottom" data-dir="bottom"></div>
    <div class="chat-resize chat-resize-corner" data-dir="corner"></div>
    <div id="chat-header">
      <!-- Universal panel header injected by initChat() -->
    </div>
    <div id="chat-body">
      <div id="plan-pane" style="display:none">
        <div id="plan-header">
          <span id="plan-title">Plan</span>
          <span style="flex:1"></span>
          <button id="plan-edit-toggle" title="Toggle edit">Edit</button>
          <button id="plan-split-toggle" title="Toggle split direction">⇄</button>
          <button id="plan-close" title="Close plan">✕</button>
        </div>
        <div id="plan-content"></div>
        <textarea id="plan-editor" style="display:none"></textarea>
        <div id="plan-actions">
          <button id="plan-approve">Approve Plan</button>
          <button id="plan-changes">Request Changes</button>
        </div>
      </div>
      <div id="plan-divider" style="display:none"></div>
      <div id="chat-main">
        <div id="chat-messages"></div>
      </div>
    </div>
    <div id="chat-input-area">
      <div id="chat-context-preview" style="display:none"></div>
      <div id="chat-attachments" class="chat-attachments" style="display:none"></div>
      <textarea id="chat-input" placeholder="Message Claude... (Enter to send)" rows="1"></textarea>
      <div id="chat-input-controls">
        <button id="chat-send">Send</button>
        <button id="chat-stop" style="display:none">Stop</button>
        <button id="chat-redirect" style="display:none">Redirect</button>
      </div>
    </div>
  </div>

  <!-- Floating "Ask Claude" tooltip (appears on text selection) -->
  <div id="selection-tooltip" style="display:none">
    <button id="selection-ask-btn">Chat with Claude</button>
  </div>

  <script>
  // Theme switcher — dropdown with preview swatches
  (function() {
    const themes = ['dark', 'light', 'paper'];
    const icons = { dark: '\u263E', light: '\u2600', paper: '\u{1F4D6}' };
    function getTheme() {
      const saved = localStorage.getItem('loom-theme');
      if (saved && themes.includes(saved)) return saved;
      if (window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
      return 'dark';
    }
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('loom-theme', t);
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = icons[t] || '\u263E';
      // Update check marks
      document.querySelectorAll('.tb-theme-check').forEach(el => {
        el.style.display = el.dataset.for === t ? 'inline' : 'none';
      });
    }
    applyTheme(getTheme());
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('theme-toggle');
      const menu = document.getElementById('theme-menu');
      if (btn && menu) {
        btn.textContent = icons[getTheme()] || '\u263E';
        // Toggle dropdown
        btn.onclick = function(e) { e.stopPropagation(); menu.classList.toggle('hidden'); };
        // Theme selection
        menu.querySelectorAll('.tb-theme-option').forEach(opt => {
          opt.onclick = function() { applyTheme(opt.dataset.theme); menu.classList.add('hidden'); };
        });
        // Close on outside click
        document.addEventListener('click', function() { menu.classList.add('hidden'); });
        menu.onclick = function(e) { e.stopPropagation(); };
      }
    });

    // Appearance settings: canvas bg, card accent, density
    function initAppearance(id, attr, defaultVal) {
      var el = document.getElementById(id);
      if (!el) return;
      var saved = localStorage.getItem('loom-' + attr) || defaultVal;
      el.value = saved;
      document.documentElement.setAttribute('data-' + attr, saved);
      el.onchange = function() {
        localStorage.setItem('loom-' + attr, el.value);
        document.documentElement.setAttribute('data-' + attr, el.value);
      };
    }
    initAppearance('setting-canvas-bg', 'canvas', 'dots');
    initAppearance('setting-card-accent', 'accent', 'border');
    initAppearance('setting-density', 'density', 'standard');
  })();
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <script src="/static/app.js"></script>
</body>
</html>
