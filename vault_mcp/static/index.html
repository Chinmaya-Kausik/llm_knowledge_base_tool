<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault — Knowledge Base</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/vendor/xterm.min.css">
  <link rel="stylesheet" href="/static/vendor/katex.min.css">
  <script src="/static/vendor/katex.min.js"></script>
  <script src="/static/vendor/katex-auto-render.min.js"></script>
  <script src="/static/vendor/xterm.min.js"></script>
  <script src="/static/vendor/xterm-fit.min.js"></script>
  <!-- Vendored locally — no CDN, instant load -->
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/vendor/d3-dispatch.min.js"></script>
  <script src="/static/vendor/d3-selection.min.js"></script>
  <script src="/static/vendor/d3-timer.min.js"></script>
  <script src="/static/vendor/d3-color.min.js"></script>
  <script src="/static/vendor/d3-ease.min.js"></script>
  <script src="/static/vendor/d3-interpolate.min.js"></script>
  <script src="/static/vendor/d3-transition.min.js"></script>
  <script src="/static/vendor/d3-drag.min.js"></script>
  <script src="/static/vendor/d3-zoom.min.js"></script>
  <script src="/static/vendor/cola.min.js"></script>
</head>
<body>
  <!-- Toolbar -->
  <header id="toolbar">
    <div class="toolbar-left">
      <button id="sidebar-toggle" title="Toggle sidebar">☰</button>
      <span class="logo">Vault</span>
      <div class="view-tabs">
        <button class="view-tab active" data-view="graph">Canvas</button>
        <button class="view-tab" data-view="files">Files</button>
        <button class="view-tab" data-view="tags">Tags</button>
        <button class="view-tab" data-view="health">Health</button>
        <button class="view-tab" data-view="search">Search</button>
      </div>
    </div>
    <div class="toolbar-right">
      <input type="search" id="search-input" placeholder="Search... (Ctrl+F)">
      <button id="btn-new-chat" class="filter-btn" title="New chat (Cmd+N)" onclick="openNewChat()" style="padding:3px 6px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
      <button id="btn-terminal" class="filter-btn" title="New terminal (Cmd+`)" onclick="createTerminalPanel()" style="padding:2px 6px"><span style="font-size:14px;line-height:1;display:block">›_</span></button>
      <div class="filter-dropdown" id="toolbar-menu-dropdown">
        <button class="filter-btn" id="btn-toolbar-menu" title="Settings &amp; Filters"><span style="font-size:22px;line-height:1;display:block;margin-top:-2px">⚙</span><span id="filter-active-dot" style="display:none">●</span></button>
        <div class="filter-menu toolbar-menu" id="toolbar-menu">
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Canvas</div>
            <div class="toolbar-menu-body">
              <div class="toolbar-menu-row">
                <button id="btn-auto-layout">Layout</button>
                <button id="btn-fit">Fit</button>
              </div>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Type Filter</div>
            <div class="toolbar-menu-body collapsed" id="filter-type-menu">
              <label><input type="checkbox" value="concept" checked> concept</label>
              <label><input type="checkbox" value="summary" checked> summary</label>
              <label><input type="checkbox" value="index" checked> index</label>
              <label><input type="checkbox" value="answer" checked> answer</label>
              <label><input type="checkbox" value="structure-note" checked> structure-note</label>
              <div class="toolbar-menu-row"><button id="filter-select-all">All</button><button id="filter-clear-all">None</button></div>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">Tag Filter</div>
            <div class="toolbar-menu-body collapsed" id="filter-tag-menu"><!-- Populated by JS --></div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="this.nextElementSibling.classList.toggle('collapsed')">File Type Filter</div>
            <div class="toolbar-menu-body collapsed" id="filter-filetype-menu">
              <label><input type="checkbox" value="folder" checked> Folders</label>
              <label><input type="checkbox" value="markdown" checked> Markdown</label>
              <label><input type="checkbox" value="code" checked> Code</label>
              <label><input type="checkbox" value="papers" checked> Papers</label>
              <label><input type="checkbox" value="data" checked> Data</label>
              <label><input type="checkbox" value="misc" checked> Misc</label>
              <div class="toolbar-menu-row"><button id="filetype-select-all">All</button><button id="filetype-clear-all">None</button></div>
            </div>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div id="settings-menu">
          <div class="settings-section">
            <label class="settings-label">Vault Root</label>
            <input type="text" id="settings-vault-root" class="settings-input" placeholder="/path/to/vault">
            <button id="settings-save-root" class="settings-action">Save &amp; Restart</button>
          </div>
          <hr>
          <div class="settings-section">
            <label class="settings-label">Claude Auth</label>
            <span id="settings-auth-status" class="settings-value">Checking...</span>
            <button id="settings-login" class="settings-action">Login</button>
          </div>
          <hr>
          <div class="settings-section">
            <label class="settings-label">Code Font Size</label>
            <input type="range" id="settings-code-font" min="10" max="20" value="13" class="settings-range">
            <span id="settings-code-font-val">13px</span>
          </div>
          <hr>
          <div class="toolbar-menu-section">
            <div class="toolbar-menu-label" onclick="openKeybindingPanel(); document.getElementById('toolbar-menu').classList.remove('open');">Keyboard Shortcuts (Cmd+K)</div>
          </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main content area -->
  <div id="main">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-tree"></div>
    </aside>

    <!-- Canvas / views -->
    <div id="canvas-container">
      <!-- Graph canvas (default view) -->
      <div id="view-graph" class="view active">
        <div id="breadcrumb-bar"><span class="crumb crumb-root" data-level="root">Root</span></div>
        <div id="infinite-canvas">
          <svg id="edge-layer"></svg>
          <div id="world" data-lod="readable"></div>
        </div>
      </div>

      <!-- Other views -->
      <div id="view-files" class="view">
        <div id="files-header">
          <div id="files-breadcrumbs"><span class="breadcrumb-item" data-path="">vault</span></div>
          <span style="flex:1"></span>
          <select id="files-sort" class="files-sort" title="Sort by">
            <option value="name">Name</option>
            <option value="modified">Modified</option>
            <option value="added">Added</option>
          </select>
          <button id="files-mode-tree" class="files-mode active" title="Tree view"><span style="font-size:22px;margin-top:0px">≡</span></button>
          <button id="files-mode-tiles" class="files-mode" title="Tile view"><span style="font-size:22px;margin-top:-1px">⊞</span></button>
        </div>
        <div id="files-tree"></div>
        <div id="files-tiles" style="display:none"></div>
      </div>
      <div id="view-tags" class="view"><div id="tag-cloud"></div></div>
      <div id="view-health" class="view"><div id="health-dashboard"></div></div>
      <div id="view-search" class="view"><div id="search-results"></div></div>
    </div>
  </div>

  <!-- Chat Panel (bottom, dockable) -->
  <div id="chat-panel" class="chat-collapsed">
    <div class="chat-resize chat-resize-top" data-dir="top"></div>
    <div class="chat-resize chat-resize-left" data-dir="left"></div>
    <div class="chat-resize chat-resize-right" data-dir="right"></div>
    <div class="chat-resize chat-resize-bottom" data-dir="bottom"></div>
    <div class="chat-resize chat-resize-corner" data-dir="corner"></div>
    <div id="chat-header">
      <!-- Universal panel header injected by initChat() -->
    </div>
    <div id="chat-body">
      <div id="plan-pane" style="display:none">
        <div id="plan-header">
          <span id="plan-title">Plan</span>
          <span style="flex:1"></span>
          <button id="plan-edit-toggle" title="Toggle edit">Edit</button>
          <button id="plan-split-toggle" title="Toggle split direction">⇄</button>
          <button id="plan-close" title="Close plan">✕</button>
        </div>
        <div id="plan-content"></div>
        <textarea id="plan-editor" style="display:none"></textarea>
        <div id="plan-actions">
          <button id="plan-approve">Approve Plan</button>
          <button id="plan-changes">Request Changes</button>
        </div>
      </div>
      <div id="plan-divider" style="display:none"></div>
      <div id="chat-main">
        <div id="chat-messages"></div>
      </div>
    </div>
    <div id="chat-input-area">
      <div id="chat-context-preview" style="display:none"></div>
      <textarea id="chat-input" placeholder="Message Claude... (Enter to send)" rows="1"></textarea>
      <div id="chat-input-controls">
        <button id="chat-send">Send</button>
        <button id="chat-stop" style="display:none">Stop</button>
        <button id="chat-redirect" style="display:none">Redirect</button>
      </div>
    </div>
  </div>

  <!-- Floating "Ask Claude" tooltip (appears on text selection) -->
  <div id="selection-tooltip" style="display:none">
    <button id="selection-ask-btn">Chat with Claude</button>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
